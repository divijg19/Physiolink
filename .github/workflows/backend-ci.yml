name: Backend CI

on:
    pull_request:
        paths:
            - "backend/**"
            - ".github/actions/**"
            - ".github/workflows/backend-ci.yml"
    push:
        branches: [main]
    workflow_dispatch: {}

jobs:
    unit:
        name: Unit tests, lint, vulncheck
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        steps:
            - name: Checkout (shallow)
              uses: actions/checkout@v6
              with:
                  fetch-depth: 1

            - name: Setup Go, cache and install tools
              uses: ./.github/actions/setup-go-cache
              with:
                  install-staticcheck: "true"
                  install-gotestsum: "true"

            - name: Run go vet
              run: |
                  go vet ./...

            - name: Run staticcheck
              run: |
                  staticcheck ./...

            - name: Verify go.sum integrity
              run: |
                  go mod verify

            - name: Install govulncheck
              run: |
                  go install golang.org/x/vuln/cmd/govulncheck@latest

            - name: Scan for vulnerabilities
              run: |
                  govulncheck ./...

            - name: Check compilation
              run: |
                  go build ./...

            - name: Run unit tests
              run: |
                  gotestsum --junitfile unit-tests.xml -- -race -coverprofile=coverage.out $(go list ./... | grep -v /integration/)

            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test-results
                  path: |
                      backend/unit-tests.xml
                      backend/coverage.out

    docker:
        name: Docker build
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 1

            - name: Build Docker image
              run: |
                  docker build -t physiolink-backend:ci .
